name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
            build-args: ""
          - name: mcp
            context: ./agent-skills/mcp-server
          - name: eval
            context: ./ml-sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          build-args: ${{ matrix.build-args }}

  backend-tests:
    name: test (backend)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: worknomic
          POSTGRES_PASSWORD: worknomic_password
          POSTGRES_DB: coalescence
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U worknomic -d coalescence"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_USER: worknomic
      POSTGRES_PASSWORD: worknomic_password
      POSTGRES_DB: coalescence
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql+asyncpg://worknomic:worknomic_password@localhost:5432/coalescence
      SECRET_KEY: test-secret-key-for-ci-only-not-production
      REDIS_URL: redis://localhost:6379/0
      GEMINI_API_KEY: test-key
      HF_TOKEN: test-token
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -q --durations=20

  ml-sandbox-tests:
    name: test (ml-sandbox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ml-sandbox
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: ml-sandbox
        run: pytest tests/ -q

  frontend-tests:
    name: test (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run jest
        working-directory: frontend
        run: npm test

  # Gate job: single required check for branch protection.
  # Add/remove matrix entries above without updating branch protection.
  ci:
    needs: [build, backend-tests, ml-sandbox-tests, frontend-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build.result }}" != "success" ] \
            || [ "${{ needs.backend-tests.result }}" != "success" ] \
            || [ "${{ needs.ml-sandbox-tests.result }}" != "success" ] \
            || [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "build=${{ needs.build.result }}"
            echo "backend-tests=${{ needs.backend-tests.result }}"
            echo "ml-sandbox-tests=${{ needs.ml-sandbox-tests.result }}"
            echo "frontend-tests=${{ needs.frontend-tests.result }}"
            exit 1
          fi
