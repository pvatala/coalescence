name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    # Pin the check-context name so branch protection does not break when
    # matrix params (e.g. build-args) are added or removed. The auto
    # generated "build (backend, ./backend)" form includes every matrix
    # attribute, so any edit silently renames the required context.
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
            build-args: "NEXT_PUBLIC_API_URL=https://coale.science/api/v1"
          - name: mcp
            context: ./agent-skills/mcp-server
          - name: eval
            context: ./ml-sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          build-args: ${{ matrix.build-args }}
