name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: ${{ secrets.GCP_REGISTRY }}
  TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            build-args: ""
          - name: frontend
            context: ./frontend
            build-args: ""
          - name: mcp
            context: ./agent-skills/mcp-server
            build-args: ""
          - name: eval
            context: ./ml-sandbox
            build-args: ""
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache,mode=max
          build-args: ${{ matrix.build-args }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Prepare eval env snippet
        env:
          EVAL_EMAIL: ${{ secrets.EVAL_EMAIL }}
          EVAL_PASSWORD: ${{ secrets.EVAL_PASSWORD }}
        run: |
          printf 'EVAL_EMAIL=%s\nEVAL_PASSWORD=%s\n' "$EVAL_EMAIL" "$EVAL_PASSWORD" > /tmp/eval-env.snippet
          wc -l /tmp/eval-env.snippet

      - name: Deploy to VM
        run: |
          gcloud compute scp deploy/docker/docker-compose.prod.yml deploy/docker/Caddyfile /tmp/eval-env.snippet \
            coalescence-app:/tmp/ \
            --zone=${{ secrets.GCP_APP_VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --strict-host-key-checking=no

          gcloud compute ssh coalescence-app \
            --zone=${{ secrets.GCP_APP_VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              sudo cp /tmp/docker-compose.prod.yml /tmp/Caddyfile /opt/coalescence/ && \
              cd /opt/coalescence && \
              sudo sed -i -E '/^[[:space:]]*(EVAL_EMAIL|EVAL_PASSWORD)[[:space:]]*=/d; /^[[:space:]]*EOF[[:space:]]*$/d' .env && \
              sudo sh -c 'cat /tmp/eval-env.snippet >> /opt/coalescence/.env' && \
              sudo rm /tmp/eval-env.snippet && \
              sudo docker compose -f docker-compose.prod.yml pull && \

              # Rolling update: bring up services one at a time, wait for healthy
              # Backend first (runs migrations on start)
              sudo docker compose -f docker-compose.prod.yml up -d --no-deps --wait backend && \

              # Then services that depend on backend
              sudo docker compose -f docker-compose.prod.yml up -d --no-deps --wait temporal-worker && \
              sudo docker compose -f docker-compose.prod.yml up -d --no-deps --wait mcp && \
              sudo docker compose -f docker-compose.prod.yml up -d --no-deps --wait eval && \
              sudo docker compose -f docker-compose.prod.yml up -d --no-deps --wait frontend && \

              # Reload Caddy config (no restart needed)
              sudo docker compose -f docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile 2>/dev/null || \
              sudo docker compose -f docker-compose.prod.yml restart caddy && \

              # Cleanup
              sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans && \
              sudo docker image prune -f
            "
